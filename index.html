<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Evolved Snake - 杰哥降臨版</title>
  <style>
    body {
      background-color: #1e1e1e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }
    #ui-container {
      display: flex;
      justify-content: space-between;
      width: 600px; 
      margin-bottom: 10px;
      align-items: flex-end;
    }
    #scoreBoard {
      font-size: 24px;
      font-weight: bold;
      color: white;
      transition: color 0.3s;
    }
    #levelBoard {
      font-size: 20px;
      font-weight: bold;
      color: #FF9800; 
    }
    #gameWrapper {
      position: relative; 
      width: 600px; 
      height: 600px; 
    }
    canvas {
      background-color: #2d2d2d;
      border: 2px solid #555;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
      position: absolute;
      top: 0;
      left: 0;
    }
    #startMenu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(30, 30, 30, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #startMenu h1 {
      color: white;
      margin-bottom: 10px;
      text-align: center;
    }
    #startMenu p {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
      text-align: center;
      line-height: 1.5;
    }
    .start-btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s;
      font-weight: bold;
    }
    .start-btn:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }
    @keyframes levelUpFlash {
      0% { color: #FF9800; transform: scale(1); }
      50% { color: #FFF; transform: scale(1.5); }
      100% { color: #FF9800; transform: scale(1); }
    }
    .level-up-anim {
      animation: levelUpFlash 0.5s ease-out;
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <div id="scoreBoard">積分: 0</div>
    <div id="levelBoard">等級: 1</div>
  </div>
  
  <div id="gameWrapper">
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    
    <div id="startMenu">
      <h1>光譜禁區：杰哥不要</h1>
      <p>方塊會原地變色，吃錯即死！<br>存活約 8 秒後，【杰哥】將會降臨。<br>他會無情追擊你，引導他輾過方塊幫你掃雷開路吧！</p>
      <button class="start-btn" onclick="startGame()">登大人</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 20;

    // 【載入圖片】確保這兩張圖都在同一個資料夾
    const headImg = new Image();
    headImg.src = 'jiege.png'; // 阿瑋的頭 (玩家)

    const chaserImg = new Image();
    chaserImg.src = 'chaser.png'; // 杰哥的頭 (死神)

    const COLORS = {
      RED: '#FF5252',
      BLUE: '#2196F3',
      YELLOW: '#FFEB3B',
      GREEN: '#4CAF50',
      PURPLE: '#9C27B0'
    };
    const COLOR_KEYS = Object.values(COLORS);

    let snake;
    let currentSnakeColor; 
    let apples; 
    let dx;
    let dy;
    let score;
    let gameStarted;
    
    let wrongColorEaten; 
    let killedByChaser; 
    
    let colorTimerMax = 50; 
    let colorTimer;

    let gameSpeed;      
    let currentLevel;   
    let survivalTicks;  
    let spawnChance;    

    let chaser;

    function initVars() {
      snake = [
        { x: 300, y: 300 },
        { x: 280, y: 300 },
        { x: 260, y: 300 }
      ];
      currentSnakeColor = COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)]; 
      dx = gridSize;
      dy = 0;
      score = 0;
      gameStarted = false;
      wrongColorEaten = false;
      killedByChaser = false;
      colorTimer = colorTimerMax;
      
      gameSpeed = 120;       
      currentLevel = 1;      
      survivalTicks = 0;     
      spawnChance = 0.05;    
      
      chaser = {
        x: -100, 
        y: -100,
        active: false
      };

      apples = [];
      for(let i=0; i<10; i++) {
        spawnApple();
      }
      
      updateScoreUI();
      updateLevelUI();
    }

    function spawnApple(specificColor = null) {
      let newX, newY;
      let isValidLocation = false;
      let attempts = 0; 

      while (!isValidLocation && attempts < 100) {
        newX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
        newY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        isValidLocation = true;
        attempts++;

        for (let i = 0; i < snake.length; i++) {
          if (snake[i].x === newX && snake[i].y === newY) {
            isValidLocation = false; break;
          }
        }
        
        if (gameStarted && isValidLocation) {
          if (newX === snake[0].x + dx && newY === snake[0].y + dy) {
            isValidLocation = false;
          }
        }

        if (isValidLocation) {
          for (let i = 0; i < apples.length; i++) {
            if (apples[i].x === newX && apples[i].y === newY) {
              isValidLocation = false; break;
            }
          }
        }
      }

      if (!isValidLocation) return;

      const color = specificColor || COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)];
      apples.push({
        x: newX, y: newY,
        color: color,
        life: 30 + Math.floor(Math.random() * 70) 
      });
    }

    function updateScoreUI() {
      const scoreBoard = document.getElementById('scoreBoard');
      scoreBoard.innerText = `積分: ${score}`;
      scoreBoard.style.color = currentSnakeColor; 
    }

    function updateLevelUI() {
      const levelBoard = document.getElementById('levelBoard');
      levelBoard.innerText = `等級: ${currentLevel}`;
      levelBoard.classList.remove('level-up-anim');
      void levelBoard.offsetWidth; 
      levelBoard.classList.add('level-up-anim');
    }

    function checkLevelUp() {
      survivalTicks++;
      if (survivalTicks % 150 === 0) {
        currentLevel++;
        updateLevelUI();

        if (gameSpeed > 50) {
          gameSpeed -= 10;
        }

        if (spawnChance < 0.25) {
          spawnChance += 0.02;
        }
      }
    }

    function startGame() {
      document.getElementById('startMenu').style.display = 'none'; 
      initVars(); 
      main();     
    }

    document.addEventListener('keydown', changeDirection);

    function main() {
      if (hasGameEnded()) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = '36px sans-serif';
        
        if (wrongColorEaten) {
          ctx.fillStyle = '#FF5252';
          ctx.fillText('顏色錯誤，毒發身亡！', canvas.width / 2, canvas.height / 2 - 20);
        } else if (killedByChaser) {
          ctx.fillStyle = '#9C27B0';
          ctx.fillText('讓我看看！(被杰哥抓到了)', canvas.width / 2, canvas.height / 2 - 20);
        } else {
          ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 20);
        }
        
        ctx.font = '20px sans-serif';
        ctx.fillStyle = 'white';
        ctx.fillText(`最終等級: ${currentLevel} | 按「空白鍵」重新挑戰`, canvas.width / 2, canvas.height / 2 + 30);
        return; 
      }

      setTimeout(function onTick() {
        clearCanvas();
        drawGrid();
        
        if (gameStarted) {
          checkLevelUp(); 
          manageSystemColor(); 
          manageApples(); 
          manageChaser(); 
          moveSnake();
        }
        
        drawApples();
        drawChaser(); 
        drawSnake();

        if (!gameStarted && !hasGameEnded()) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = 'white';
          ctx.font = '18px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('按任意方向鍵開始逃跑', canvas.width / 2, canvas.height / 2);
        }

        main();
      }, gameSpeed); 
    }

    function clearCanvas() {
      ctx.fillStyle = '#2d2d2d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawGrid() {
      ctx.strokeStyle = '#3d3d3d';
      for (let i = 0; i < canvas.width; i += gridSize) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
      }
    }

    function drawSnake() {
      let isBlinking = false;
      if (colorTimer < 15) {
        if (colorTimer % 4 < 2) {
          isBlinking = true;
        }
      }

      snake.forEach((part, index) => {
        if (index === 0) {
          // 畫出阿瑋的頭
          ctx.drawImage(headImg, part.x - 2, part.y - 2, gridSize + 4, gridSize + 4);
        } else {
          ctx.fillStyle = isBlinking ? 'white' : currentSnakeColor; 
          ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
        }
      });
    }

    function drawApples() {
      apples.forEach(apple => {
        let sizeOffset = 0;
        ctx.fillStyle = apple.color;

        if (apple.life < 15) {
          sizeOffset = 4; 
          if (apple.life % 4 < 2) {
            ctx.fillStyle = 'white';
          }
        }
        ctx.fillRect(apple.x + sizeOffset/2, apple.y + sizeOffset/2, gridSize - 2 - sizeOffset, gridSize - 2 - sizeOffset);
      });
    }

    function drawChaser() {
      if (chaser.active) {
        // 【修改】將骷髏頭換成杰哥的圖片，稍微畫大一點更有壓迫感
        ctx.drawImage(chaserImg, chaser.x - 4, chaser.y - 4, gridSize + 8, gridSize + 8);
      }
    }

    function manageSystemColor() {
      colorTimer--;
      if (colorTimer <= 0) {
        let newColor = currentSnakeColor;
        while (newColor === currentSnakeColor) {
          newColor = COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)];
        }
        currentSnakeColor = newColor;
        colorTimer = colorTimerMax;
        updateScoreUI();
      }
    }

    function manageApples() {
      for (let i = 0; i < apples.length; i++) {
        apples[i].life--;
        if (apples[i].life <= 0) {
          let newColor = apples[i].color;
          while (newColor === apples[i].color) {
            newColor = COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)];
          }
          apples[i].color = newColor;
          apples[i].life = 30 + Math.floor(Math.random() * 70);
        }
      }

      if (apples.length < 100 && Math.random() < spawnChance) {
        spawnApple();
      }
    }

    function manageChaser() {
      if (!chaser.active && survivalTicks === 80) {
        chaser.active = true;
        chaser.x = snake[0].x > canvas.width / 2 ? 0 : canvas.width - gridSize;
        chaser.y = snake[0].y > canvas.height / 2 ? 0 : canvas.height - gridSize;
      }

      if (chaser.active) {
        if (survivalTicks % 2 === 0) {
          let diffX = snake[0].x - chaser.x;
          let diffY = snake[0].y - chaser.y;

          if (Math.abs(diffX) > Math.abs(diffY)) {
            chaser.x += (diffX > 0 ? gridSize : -gridSize);
          } else if (diffY !== 0) {
            chaser.y += (diffY > 0 ? gridSize : -gridSize);
          }

          for (let i = apples.length - 1; i >= 0; i--) {
            if (apples[i].x === chaser.x && apples[i].y === chaser.y) {
              apples.splice(i, 1);
            }
          }
        }
      }
    }

    function changeDirection(event) {
      const LEFT_KEY = 37; const RIGHT_KEY = 39; const UP_KEY = 38; const DOWN_KEY = 40; const SPACE_KEY = 32;
      const keyPressed = event.keyCode;
      
      if (hasGameEnded()) {
        if (keyPressed === SPACE_KEY) {
          clearCanvas(); drawGrid();
          document.getElementById('startMenu').style.display = 'flex'; 
        }
        return;
      }

      if ([LEFT_KEY, RIGHT_KEY, UP_KEY, DOWN_KEY].includes(keyPressed)) {
        gameStarted = true;
      }

      const goingUp = dy === -gridSize; const goingDown = dy === gridSize;
      const goingRight = dx === gridSize; const goingLeft = dx === -gridSize;

      if (keyPressed === LEFT_KEY && !goingRight) { dx = -gridSize; dy = 0; }
      if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -gridSize; }
      if (keyPressed === RIGHT_KEY && !goingLeft) { dx = gridSize; dy = 0; }
      if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = gridSize; }
    }

    function moveSnake() {
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      snake.unshift(head);

      let eatenIndex = -1;
      for (let i = 0; i < apples.length; i++) {
        if (snake[0].x === apples[i].x && snake[0].y === apples[i].y) {
          eatenIndex = i;
          break;
        }
      }

      if (eatenIndex !== -1) {
        if (apples[eatenIndex].color === currentSnakeColor) {
          score += 10;
          updateScoreUI();
          apples.splice(eatenIndex, 1);
        } else {
          wrongColorEaten = true;
          snake.pop(); 
        }
      } else {
        snake.pop(); 
      }
    }

    function hasGameEnded() {
      if (!gameStarted) return false; 
      if (wrongColorEaten) return true;

      if (chaser.active) {
        for (let i = 0; i < snake.length; i++) {
          // 放寬一點點死神判定範圍，不然圖片有時候看起來沒碰到就死了
          if (Math.abs(chaser.x - snake[i].x) < gridSize && Math.abs(chaser.y - snake[i].y) < gridSize) {
            killedByChaser = true;
            return true;
          }
        }
      }

      for (let i = 4; i < snake.length; i++) {
        if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
      }

      const hitLeftWall = snake[0].x < 0;
      const hitRightWall = snake[0].x >= canvas.width;
      const hitTopWall = snake[0].y < 0;
      const hitBottomWall = snake[0].y >= canvas.height;
      if (hitLeftWall || hitRightWall || hitTopWall || hitBottomWall) return true;

      return false;
    }
    
    clearCanvas();
    drawGrid();
  </script>
</body>
</html>
